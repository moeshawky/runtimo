# cargo-deny configuration — license + vulnerability + ban audit
# https://EmbarkStudios.github.io/cargo-deny/

[advisories]
# "all" catches unmaintained dependencies; cargo-deny >=0.16 requires this, not "warn"
unmaintained = "all"
yanked = "warn"
# RUSTSEC-2024-0375: `dirs` is unmaintained — transitive via llmosafe → dirs.
# Not directly depended on; no fix is possible without upstream changes.
ignore = [
    "RUSTSEC-2024-0375",  # dirs — unmaintained, transitive via llmosafe → dirs
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
