[workspace]
resolver = "2"
members = [
    "core",
    "daemon",
    "cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Runtimo-1.0"
authors = ["Moe Shawky"]

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }
